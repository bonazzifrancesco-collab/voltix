[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"

# Aumenta timeout per le funzioni AI (max 26 secondi su piano gratuito)
[functions."analisi-mercato"]
  timeout = 26

[functions."analyze-bill"]
  timeout = 26

[functions."fetch-pun"]
  timeout = 26
